apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: librarie
  labels:
    app: alloy
    component: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
      component: logging
  template:
    metadata:
      labels:
        app: alloy
        component: logging
    spec:
      # Security context with required fsGroup: 190
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 190
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: alloy

      containers:
      - name: alloy
        image: grafana/alloy:latest
        imagePullPolicy: IfNotPresent
        
        # Container security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        args:
        - run
        - /etc/alloy/config.alloy
        - --server.http.listen-addr=0.0.0.0:12345
        - --cluster.enabled=false
        - --disable-reporting=true
        
        ports:
        - name: http-metrics
          containerPort: 12345
          protocol: TCP
        
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: LOKI_URL
          value: "http://loki:3100/loki/api/v1/push"
        - name: LOKI_USERNAME
          valueFrom:
            secretKeyRef:
              name: loki-credentials
              key: username
              optional: true
        - name: LOKI_PASSWORD
          valueFrom:
            secretKeyRef:
              name: loki-credentials
              key: password
              optional: true
        
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
          readOnly: true
        - name: data
          mountPath: /tmp/alloy-data
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 12345
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 12345
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      
      volumes:
      - name: config
        configMap:
          name: alloy-config
      - name: data
        emptyDir: {}
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
          
      tolerations:
      - operator: Exists
        effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux