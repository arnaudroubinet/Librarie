apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: librarie-alloy-logging

namespace: librarie

resources:
- namespace.yaml
- alloy/alloy-rbac.yaml
- alloy/alloy-config.yaml
- alloy/alloy-deployment.yaml
- alloy/alloy-service.yaml

images:
- name: grafana/alloy
  newTag: v1.4.2

commonLabels:
  project: librarie
  monitoring: alloy

patches:
- target:
    kind: Deployment
    name: alloy
  patch: |-
    - op: replace
      path: /spec/template/spec/securityContext/fsGroup
      value: 190